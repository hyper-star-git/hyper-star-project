<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hyper star poject</title>

  <!-- Pixel Fonts (EN + JP) -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
  <!-- cssファイル -->
  <link rel="stylesheet" href="css/common.css">
</head>
<body>

<!-- 背景用 -->
<div id="bg"></div>
<div id="bg-cube"></div>

<nav>
  <div class="font-jp">メインぺージ</div>
</nav>

<!-- コンテンツ -->
<main>
  <!-- ページ遷移用 -->
  <div id="page-transition"></div>

  <div class="hero">
    <h1 class="font-en">HYPER STAR PROJECT</h1>
    <video controls autoplay muted loop>
      <source src="sample.mp4" type="video/mp4">
    </video>
  </div>
  
  <section id="projects" class="content-box main-page">
    <h2 class="font-en">PROJECTS</h2>
    <div class="font-jp">
      各シリーズの詳細を見れます
    </div>
    <br>
  
    <div class="card-container">
      <div class="card font-jp">人狼PvP</div>
      <div class="card font-jp">サバイバル</div>
      <div class="card font-jp">誕生日動画</div>
    </div>
  </section>
  
  <section id="serial" class="content-box main-page">
    <h2 class="font-en">KEYWORD</h2>
    <div class="font-jp">
      キーワードを入れると何かあるかも・・・？
    </div>
  
    <div class="serial-box">
      <input type="text" id="serial-input" placeholder="キーワードを入力">
      <button id="serial-btn">
        <span class="font-en">OK</span>
      </button>
    </div>
  </section>
</main>
